name: Validate API Specs

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Spectral lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint OpenAPI spec
        run: pnpm exec spectral lint openapi.yml --ruleset .spectral.yml --fail-severity error

      - name: Lint AsyncAPI spec
        run: pnpm exec spectral lint asyncapi.yml --ruleset .spectral.asyncapi.yml --fail-severity error
